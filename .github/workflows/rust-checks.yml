name: Rust Checks

on:
  workflow_call:
    inputs:
      working-directory:
        description: Répertoire contenant le Cargo.toml racine
        type: string
        default: "."
      workspace:
        description: Passe --workspace à cargo fmt/clippy/test
        type: boolean
        default: false
      sqlx-offline:
        description: Injecte SQLX_OFFLINE=true (pas de DB au build)
        type: boolean
        default: false
      artifact-name:
        description: Nom de l'artifact uploadé (vide = pas d'upload)
        type: string
        default: ""
      binary-path:
        description: Chemin du binaire relatif au working-directory (ex. target/release/monapp)
        type: string
        default: ""

jobs:
  lint:
    name: Lint (fmt + clippy)
    runs-on: komrad-runners
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "${{ inputs.working-directory }} -> target"
      - name: Install Rust native build dependencies
        run: |
          sudo find /etc/apt -type f \( -name '*.list' -o -name '*.sources' \) -exec sed -i -E 's#http://(archive|security)\.ubuntu\.com/ubuntu#https://\1.ubuntu.com/ubuntu#g' {} +
          sudo apt-get -o Acquire::ForceIPv4=true update
          sudo apt-get -o Acquire::ForceIPv4=true install -y --no-install-recommends build-essential pkg-config libssl-dev ca-certificates
      - name: cargo fmt --check
        working-directory: ${{ inputs.working-directory }}
        run: cargo fmt --check
      - name: cargo clippy
        working-directory: ${{ inputs.working-directory }}
        env:
          WORKSPACE_FLAG: ${{ inputs.workspace && '--workspace' || '' }}
        run: cargo clippy $WORKSPACE_FLAG -- -D warnings

  build:
    name: Build (test + release)
    runs-on: komrad-runners
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "${{ inputs.working-directory }} -> target"
      - name: Install Rust native build dependencies
        run: |
          sudo find /etc/apt -type f \( -name '*.list' -o -name '*.sources' \) -exec sed -i -E 's#http://(archive|security)\.ubuntu\.com/ubuntu#https://\1.ubuntu.com/ubuntu#g' {} +
          sudo apt-get -o Acquire::ForceIPv4=true update
          sudo apt-get -o Acquire::ForceIPv4=true install -y --no-install-recommends build-essential pkg-config libssl-dev ca-certificates
      - name: cargo test
        working-directory: ${{ inputs.working-directory }}
        env:
          SQLX_OFFLINE: ${{ inputs.sqlx-offline && 'true' || '' }}
          WORKSPACE_FLAG: ${{ inputs.workspace && '--workspace' || '' }}
          CARGO_BUILD_JOBS: "2"
        run: cargo test $WORKSPACE_FLAG
      - name: cargo build --release
        working-directory: ${{ inputs.working-directory }}
        env:
          SQLX_OFFLINE: ${{ inputs.sqlx-offline && 'true' || '' }}
          CARGO_BUILD_JOBS: "2"
        run: cargo build --release
      - name: Upload binary
        if: inputs.artifact-name != ''
        uses: actions/upload-artifact@v5
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.working-directory }}/${{ inputs.binary-path }}
          retention-days: 1
