name: Security — Docker

on:
  workflow_call:
    inputs:
      dockerfile:
        description: Chemin du Dockerfile (ex. "api/Dockerfile")
        type: string
        default: "Dockerfile"
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  hadolint:
    name: hadolint (${{ inputs.dockerfile }})
    runs-on: komrad-runners
    steps:
      - uses: actions/checkout@v5
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ${{ inputs.dockerfile }}

  grype:
    name: grype (${{ inputs.dockerfile }})
    runs-on: komrad-runners
    steps:
      - uses: actions/checkout@v5
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build image
        env:
          DOCKERFILE: ${{ inputs.dockerfile }}
        run: |
          ctx=$(dirname "$DOCKERFILE")
          [ "$ctx" = "." ] && label="app" || label=$(basename "$ctx")
          docker build -t "scan-${label}:latest" -f "$DOCKERFILE" "$ctx"
          echo "IMAGE=scan-${label}:latest" >> "$GITHUB_ENV"
      - uses: anchore/scan-action@v5
        with:
          image: ${{ env.IMAGE }}
          fail-build: true
          severity-cutoff: high
          only-fixed: true
          output-format: table
