name: Vector Checks

on:
  workflow_call:
    inputs:
      vector-image:
        description: Vector Docker image to use
        type: string
        default: "timberio/vector:0.54.0-debian"
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  validate:
    name: Vector validate
    runs-on: komrad-runners
    container:
      image: ${{ inputs.vector-image }}
      credentials:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - name: Validate Vector configs
        run: |
          chmod +x ci/validate.sh
          ci/validate.sh
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: validate-results
          path: ci/results/
          retention-days: 7

  test:
    name: Vector test
    runs-on: komrad-runners
    container:
      image: ${{ inputs.vector-image }}
      credentials:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - name: Run Vector tests
        run: |
          chmod +x ci/test.sh
          ci/test.sh
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: test-results
          path: ci/results/
          retention-days: 7

  coverage:
    name: Vector coverage
    runs-on: komrad-runners
    container:
      image: ${{ inputs.vector-image }}
      credentials:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - name: Check coverage
        run: |
          chmod +x ci/coverage.sh
          ci/coverage.sh

  report:
    name: CI report
    runs-on: komrad-runners
    needs: [validate, test]
    if: needs.validate.result != 'cancelled' && needs.test.result != 'cancelled'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v5
        with:
          name: validate-results
          path: ci/results/
      - uses: actions/download-artifact@v5
        with:
          name: test-results
          path: ci/results/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate report
        run: python ci/report.py
      - uses: actions/upload-artifact@v5
        with:
          name: ci-report
          path: ci/results/report.md
          retention-days: 30
