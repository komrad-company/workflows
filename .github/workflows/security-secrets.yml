name: Security — Secrets

on:
  workflow_call:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (secrets)
    runs-on: komrad-runners
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Run gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz -o /tmp/gitleaks.tar.gz
          tar xz -C /tmp -f /tmp/gitleaks.tar.gz gitleaks
          /tmp/gitleaks detect --source . --verbose
