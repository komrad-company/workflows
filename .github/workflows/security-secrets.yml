name: Security — Secrets

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (secrets)
    runs-on: komrad-runners
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar -xz
          sudo mv gitleaks /usr/local/bin/
          gitleaks version
      - name: Run gitleaks (gate)
        run: gitleaks detect --source . --redact --verbose --report-format sarif --report-path gitleaks.sarif --exit-code 1
      - name: Run gitleaks (JSON — reporting)
        if: always()
        run: gitleaks detect --source . --redact --report-format json --report-path gitleaks.json --exit-code 0
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: gitleaks-report
          path: |
            gitleaks.sarif
            gitleaks.json
          retention-days: 30
