name: Security — Secrets

on:
  workflow_call:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (secrets)
    runs-on: komrad-runners
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
