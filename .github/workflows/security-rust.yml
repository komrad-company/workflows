name: Security — Rust

on:
  workflow_call:
    inputs:
      manifest-path:
        description: Chemin du Cargo.toml a analyser avec cargo-deny
        type: string
        default: "api/Cargo.toml"
permissions:
  contents: read

jobs:
  cargo-audit:
    name: cargo audit (RustSec)
    runs-on: komrad-runners
    steps:
      - uses: actions/checkout@v5
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  cargo-deny:
    name: cargo deny (licences + bans + advisories)
    runs-on: komrad-runners
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: ${{ inputs.manifest-path }}
