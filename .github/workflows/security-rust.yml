name: Security — Rust

on:
  workflow_call:
    inputs:
      manifest-path:
        description: Path to the Cargo.toml to analyse with cargo-deny
        type: string
        default: "api/Cargo.toml"
permissions:
  contents: read

jobs:
  cargo-deny:
    name: cargo deny (licences + bans + advisories)
    runs-on: komrad-runners
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: ${{ inputs.manifest-path }}
