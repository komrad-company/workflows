name: Rust - Run tests
description: "Run tests for crate"

inputs:
    release:
        description: "Work on release version"
        default: false

runs:
    using: "composite"
    steps:
        - uses: komrad-company/workflows/actions/rust/setup-toolchain@main

        - uses: actions/download-artifact@v4
          with:
            name: build

        - run: cargo test ${{ inputs.release == 'true' && '--release' || '' }}
          shell: bash
